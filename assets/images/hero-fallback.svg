<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1100" viewBox="0 0 1400 1100" role="img" aria-labelledby="title desc">
  <title id="title">Jaiwin Design Studio abstract hero artwork</title>
  <desc id="desc">A colorful futuristic creative workspace with glowing panels and abstract design shapes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#09113a"/>
      <stop offset="0.45" stop-color="#160839"/>
      <stop offset="1" stop-color="#07101d"/>
    </linearGradient>
    <radialGradient id="violet" cx="45%" cy="34%" r="60%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="0.18" stop-color="#23d9ff" stop-opacity="0.85"/>
      <stop offset="0.48" stop-color="#8f42ff" stop-opacity="0.65"/>
