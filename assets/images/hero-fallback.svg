    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="38" stdDeviation="38" flood-color="#000000" flood-opacity="0.36"/>
    </filter>
  </defs>
  <rect width="1400" height="1100" fill="url(#bg)"/>
