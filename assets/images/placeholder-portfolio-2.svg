<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Jai Sports Badminton Tournament Flyer</title>
  <desc id="desc">A vivid placeholder badminton flyer with court lines, neon movement, and event typography.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#111b64"/>
      <stop offset="0.5" stop-color="#8f42ff"/>
      <stop offset="1" stop-color="#23d9ff"/>
    </linearGradient>
    <filter id="glow">
