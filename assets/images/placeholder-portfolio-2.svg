  <path d="M780 322L898 250M792 252L886 326" stroke="#07101d" stroke-width="10" stroke-linecap="round"/>
  <text x="94" y="140" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="66" font-weight="900">JAI SPORTS</text>
  <text x="96" y="215" fill="#8df1ff" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="800">BADMINTON TOURNAMENT</text>
