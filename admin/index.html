<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Jaiwin Design Studio Admin</title>
    <style>
      body {
        margin: 0;
        background: #07081d;
        color: #ffffff;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .admin-loading {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        text-align: center;
      }

      .admin-loading div {
        max-width: 520px;
        padding: 28px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.08);
      }

      .admin-loading h1 {
        margin: 0 0 10px;
        font-size: 1.6rem;
      }

      .admin-loading p {
        margin: 0;
        color: rgba(255, 255, 255, 0.72);
        line-height: 1.6;
      }

      .admin-actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
        margin-top: 18px;
      }

      .admin-actions a {
        display: inline-flex;
        min-height: 42px;
        align-items: center;
        justify-content: center;
        padding: 9px 13px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 8px;
        color: #ffffff;
        background: rgba(255, 255, 255, 0.08);
        font-size: 0.92rem;
        font-weight: 800;
        text-decoration: none;
      }

      .admin-actions a:first-child {
        color: #07101d;
        border-color: transparent;
        background: linear-gradient(135deg, #ffffff, #8df1ff 42%, #ffdf8f);
      }
    </style>
  </head>
  <body>
    <div class="admin-loading">
      <div>
        <h1>Jaiwin Design Studio Admin</h1>
        <p>Loading the visual content editor. Sign in with the invited Netlify Identity account to update the website.</p>
        <div class="admin-actions">
          <a href="/admin/editor">Open live website editor</a>
          <a href="/">View website</a>
        </div>
      </div>
    </div>

    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script src="https://unpkg.com/decap-cms@^3.6.2/dist/decap-cms.js"></script>
    <script src="/admin/preview.js"></script>
    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", function (user) {
          if (!user) {
            window.netlifyIdentity.on("login", function () {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>
  </body>
</html>
