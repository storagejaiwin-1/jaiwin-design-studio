backend:
  name: git-gateway
  branch: main

local_backend: true

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

site_url: "/"
display_url: "/"
logo_url: "/assets/images/hero-fallback.svg"

editor:
  preview: true

collections:
  - name: "site_settings"
    label: "Site Settings"
    description: "Business identity, SEO, colors, and global contact details."
    files:
      - label: "Business and SEO Settings"
        name: "site_settings"
        file: "content/site-settings.json"
        format: "json"
        fields:
          - label: "Business name"
            name: "businessName"
            widget: "string"
            hint: "Shown in the browser title, footer, and admin-friendly labels."
          - label: "Logo mark text"
            name: "logoMarkText"
            widget: "string"
            hint: "Short text inside the square logo mark. Example: JD."
          - label: "Logo text"
            name: "logoText"
            widget: "string"
            hint: "Short text shown beside the JD logo mark in the header."
          - label: "Loader small text"
            name: "loaderEyebrow"
            widget: "string"
            hint: "Small uppercase text shown while the website loads."
          - label: "Phone"
            name: "phone"
            widget: "string"
            hint: "Public phone number. Example: +91 95975 51805."
          - label: "WhatsApp number"
            name: "whatsappNumber"
            widget: "string"
            hint: "Used for WhatsApp buttons. Include country code."
          - label: "Email"
            name: "email"
            widget: "string"
          - label: "Instagram handle"
            name: "instagramHandle"
            widget: "string"
            hint: "Example: @jaiwindesignstudio."
          - label: "Instagram URL"
            name: "instagramUrl"
            widget: "string"
            hint: "Use the full profile URL."
          - label: "Location"
            name: "location"
            widget: "string"
            hint: "Short location shown in the hero."
          - label: "Location badge text"
            name: "locationLabel"
            widget: "string"
            hint: "Tiny badge before the hero location. Example: LOC."
          - label: "Full address"
            name: "fullAddress"
            widget: "text"
          - label: "Navigation links"
            name: "navLinks"
            widget: "list"
            summary: "{{fields.label}}"
            minimize_collapsed: true
            fields:
              - label: "Label"
                name: "label"
                widget: "string"
              - label: "Link"
                name: "url"
                widget: "string"
                hint: "Use section links such as #about or a full URL."
          - label: "Navigation button label"
            name: "navCtaLabel"
            widget: "string"
          - label: "Footer text"
            name: "footerText"
            widget: "text"
          - label: "Footer credit text"
            name: "footerCreditText"
            widget: "string"
            hint: "The year is added automatically before this text."
          - label: "SEO title"
            name: "seoTitle"
            widget: "string"
            hint: "Recommended length: under 60 characters."
          - label: "SEO description"
            name: "seoDescription"
            widget: "text"
            hint: "Recommended length: 140 to 160 characters."
          - label: "Page background color"
            name: "backgroundColor"
            widget: "color"
            allowInput: true
          - label: "Surface color"
            name: "surfaceColor"
            widget: "color"
            allowInput: true
            hint: "Used for darker panels and background depth."
          - label: "Main text color"
            name: "textColor"
            widget: "color"
            allowInput: true
          - label: "Muted text color"
            name: "mutedTextColor"
            widget: "color"
            allowInput: true
          - label: "Primary brand color"
            name: "primaryBrandColor"
            widget: "color"
            allowInput: true
            hint: "Main accent color used by the website."
          - label: "Secondary brand color"
            name: "secondaryBrandColor"
            widget: "color"
            allowInput: true
            hint: "Secondary accent color used by the website."
          - label: "Highlight color"
            name: "highlightColor"
            widget: "color"
            allowInput: true
            hint: "Accent color for focus states, section labels, and glowing details."

  - name: "landing_page"
    label: "Landing Page"
    description: "Hero section text, buttons, and fallback image."
    files:
      - label: "Hero Content"
        name: "landing"
        file: "content/landing.json"
        format: "json"
        fields:
          - label: "Eyebrow text"
            name: "eyebrowText"
            widget: "string"
          - label: "Main headline"
            name: "mainHeadline"
            widget: "string"
            hint: "First line of the big hero title."
          - label: "Highlighted headline word"
            name: "highlightedHeadlineWord"
            widget: "string"
            hint: "Gradient word shown below the main headline."
          - label: "Subheadline"
            name: "subheadline"
            widget: "text"
          - label: "Primary CTA label"
            name: "primaryCtaLabel"
            widget: "string"
          - label: "Primary CTA link"
            name: "primaryCtaLink"
            widget: "string"
            hint: "Use #portfolio, #contact, or a full URL."
          - label: "Secondary CTA label"
            name: "secondaryCtaLabel"
            widget: "string"
          - label: "Secondary CTA link"
            name: "secondaryCtaLink"
            widget: "string"
            hint: "Use whatsapp for the automatic WhatsApp link, or enter a full URL."
          - label: "Hero image fallback"
            name: "heroImageFallback"
            widget: "image"
            choose_url: true
            hint: "Shown on mobile, slow devices, or when 3D is unavailable."
          - label: "Hero image alt text"
            name: "heroImageAlt"
            widget: "string"
            hint: "Short description of the hero fallback image."
          - label: "Hero card small label"
            name: "heroCardEyebrow"
            widget: "string"
          - label: "Hero card title"
            name: "heroCardTitle"
            widget: "string"
          - label: "Hero card text"
            name: "heroCardText"
            widget: "string"
          - label: "3D mode setting"
            name: "threeDMode"
            widget: "select"
            options:
              - label: "Custom Three.js"
                value: "custom-three"
              - label: "Fallback image only"
                value: "fallback"
            hint: "The current static version supports the custom Three.js visual and fallback image."

  - name: "services"
    label: "Services"
    description: "Add, remove, rename, or reorder service cards."
    files:
      - label: "Service Section"
        name: "services"
        file: "content/services.json"
        format: "json"
        fields:
          - label: "Show services section"
            name: "enabled"
            widget: "boolean"
            default: true
          - label: "Section kicker"
            name: "sectionKicker"
            widget: "string"
          - label: "Section heading"
            name: "heading"
            widget: "string"
          - label: "Section subheading"
            name: "subheading"
            widget: "text"
          - label: "Featured badge label"
            name: "featuredLabel"
            widget: "string"
          - label: "Services list"
            name: "items"
            widget: "list"
            summary: "{{fields.name}}"
            minimize_collapsed: true
            fields:
              - label: "Service name"
                name: "name"
                widget: "string"
              - label: "Short description"
                name: "description"
                widget: "text"
              - label: "Icon name"
                name: "iconName"
                widget: "string"
                hint: "Use a simple label such as banner, camera, gift, logo, web, or sports."
              - label: "Featured"
                name: "featured"
                widget: "boolean"
                default: false

  - name: "portfolio"
    label: "Post Work / Portfolio"
    description: "Add your regular work posts here. Upload an image, write the title, choose the category, and publish."
    files:
      - label: "Work Posts"
        name: "portfolio"
        file: "content/portfolio.json"
        format: "json"
        preview_path: "/#portfolio"
        fields:
          - label: "Show portfolio section"
            name: "enabled"
            widget: "boolean"
            default: true
          - label: "Section kicker"
            name: "sectionKicker"
            widget: "string"
          - label: "Section heading"
            name: "heading"
            widget: "string"
          - label: "Section subheading"
            name: "subheading"
            widget: "text"
          - label: "Section button label"
            name: "ctaLabel"
            widget: "string"
          - label: "Section button link"
            name: "ctaLink"
            widget: "string"
            hint: "Use #contact or a full URL."
          - label: "Featured badge label"
            name: "featuredLabel"
            widget: "string"
          - label: "Video link label"
            name: "videoLabel"
            widget: "string"
          - label: "Work posts"
            name: "items"
            widget: "list"
            summary: "{{fields.title}}"
            minimize_collapsed: true
            add_to_top: true
            hint: "Use Add Item whenever you finish a new design and want it shown on the website."
            fields:
              - label: "Title"
                name: "title"
                widget: "string"
                hint: "Example: Beach Legends Premier League Banner."
              - label: "Description"
                name: "description"
                widget: "text"
                hint: "A short line about the design, event, or client need."
              - label: "Category"
                name: "category"
                widget: "select"
                options:
                  - "Sports Banner"
                  - "Sports Flyer"
                  - "Event Poster"
                  - "Wedding Banner"
                  - "Invitation"
                  - "Logo Design"
                  - "Shop Banner"
                  - "Memorial Banner"
                  - "Web Design"
                  - "Other"
              - label: "Date posted"
                name: "postedDate"
                widget: "datetime"
                required: false
                date_format: "DD MMM YYYY"
                time_format: false
                picker_utc: false
                hint: "Optional. Helpful when you regularly add recent work."
              - label: "Image upload"
                name: "image"
                widget: "image"
                choose_url: true
                media_library:
                  config:
                    multiple: false
                hint: "Recommended: JPG, PNG, or WebP, 1200px wide or larger. Very large files can upload slowly."
              - label: "Optional video upload"
                name: "videoUpload"
                widget: "file"
                required: false
                media_library:
                  config:
                    multiple: false
              - label: "Optional external video URL"
                name: "externalVideoUrl"
                widget: "string"
                required: false
                hint: "Use a public video URL if the video is hosted elsewhere."
              - label: "Featured"
                name: "featured"
                widget: "boolean"
                default: false
              - label: "Alt text"
                name: "altText"
                widget: "string"
                hint: "Describe the image for accessibility."

  - name: "about"
    label: "About"
    description: "Studio story, highlight copy, image, and stats."
    files:
      - label: "About Section"
        name: "about"
        file: "content/about.json"
        format: "json"
        fields:
          - label: "Show about section"
            name: "enabled"
            widget: "boolean"
            default: true
          - label: "Section kicker"
            name: "sectionKicker"
            widget: "string"
          - label: "Heading"
            name: "heading"
            widget: "string"
          - label: "Highlight text"
            name: "highlightText"
            widget: "text"
          - label: "Image upload"
            name: "image"
            widget: "image"
            choose_url: true
          - label: "Image alt text"
            name: "imageAlt"
            widget: "string"
          - label: "Paragraphs"
            name: "paragraphs"
            widget: "list"
            field:
              label: "Paragraph"
              name: "paragraph"
              widget: "text"
          - label: "Stats list"
            name: "stats"
            widget: "list"
            summary: "{{fields.value}} - {{fields.label}}"
            fields:
              - label: "Value"
                name: "value"
                widget: "string"
              - label: "Label"
                name: "label"
                widget: "string"

  - name: "contact"
    label: "Contact"
    description: "Contact text, address, map link, hours, and form message."
    files:
      - label: "Contact Section"
        name: "contact"
        file: "content/contact.json"
        format: "json"
        fields:
          - label: "Show contact section"
            name: "enabled"
            widget: "boolean"
            default: true
          - label: "Section kicker"
            name: "sectionKicker"
            widget: "string"
          - label: "Contact heading"
            name: "heading"
            widget: "string"
          - label: "Contact subheading"
            name: "subheading"
            widget: "text"
          - label: "WhatsApp CTA text"
            name: "whatsappCtaText"
            widget: "string"
          - label: "Email CTA text"
            name: "emailCtaText"
            widget: "string"
          - label: "Instagram CTA text"
            name: "instagramCtaText"
            widget: "string"
          - label: "Address"
            name: "address"
            widget: "text"
          - label: "Map CTA text"
            name: "mapCtaText"
            widget: "string"
          - label: "Map link"
            name: "mapLink"
            widget: "string"
            hint: "Google Maps search links work without a paid API key."
          - label: "Business hours"
            name: "businessHours"
            widget: "string"
          - label: "Name field label"
            name: "nameLabel"
            widget: "string"
          - label: "Phone field label"
            name: "phoneLabel"
            widget: "string"
          - label: "Project type field label"
            name: "projectTypeLabel"
            widget: "string"
          - label: "Project type placeholder"
            name: "projectTypePlaceholder"
            widget: "string"
          - label: "Project type options"
            name: "projectTypeOptions"
            widget: "list"
            field:
              label: "Option"
              name: "option"
              widget: "string"
          - label: "Message field label"
            name: "messageLabel"
            widget: "string"
          - label: "Message placeholder"
            name: "messagePlaceholder"
            widget: "string"
          - label: "Submit button label"
            name: "submitLabel"
            widget: "string"
          - label: "Contact form success message"
            name: "contactFormSuccessMessage"
            widget: "text"

  - name: "homepage_sections"
    label: "Homepage Highlights"
    description: "Why choose us cards and other homepage supporting copy."
    files:
      - label: "Why Choose Us"
        name: "homepage_sections"
        file: "content/homepage-sections.json"
        format: "json"
        fields:
          - label: "Show highlights section"
            name: "enabled"
            widget: "boolean"
            default: true
          - label: "Section kicker"
            name: "sectionKicker"
            widget: "string"
          - label: "Highlights heading"
            name: "highlightsHeading"
            widget: "string"
          - label: "Highlights subheading"
            name: "highlightsSubheading"
            widget: "text"
          - label: "Highlights"
            name: "highlights"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - label: "Title"
                name: "title"
                widget: "string"
              - label: "Description"
                name: "description"
                widget: "text"
              - label: "Icon name"
                name: "iconName"
                widget: "string"

  - name: "process"
    label: "Process"
    description: "Workflow steps shown near the bottom of the page."
    files:
      - label: "Process Section"
        name: "process"
        file: "content/process.json"
        format: "json"
        fields:
          - label: "Show process section"
            name: "enabled"
            widget: "boolean"
            default: true
          - label: "Section kicker"
            name: "sectionKicker"
            widget: "string"
          - label: "Heading"
            name: "heading"
            widget: "string"
          - label: "Subheading"
            name: "subheading"
            widget: "text"
          - label: "Steps"
            name: "steps"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - label: "Title"
                name: "title"
                widget: "string"
              - label: "Description"
                name: "description"
                widget: "text"
